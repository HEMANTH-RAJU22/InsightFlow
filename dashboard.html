<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>InsightFlow Dashboard</title>

<!-- connect CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Top Navigation -->

<div class="topbar">

<div class="logo">INSIGHTFLOW</div>

<div class="nav-links">
<span onclick="goAccount()">Account</span>
<span onclick="logout()">Logout</span>
</div>

</div>


<!-- Dashboard -->

<div class="dashboard">

<h1>Upload Dataset</h1>

<!-- Upload -->
<div class="upload-box">

<label for="fileInput" class="upload-label">
📂 Select Dataset
</label>

<input type="file" id="fileInput" accept=".csv,.txt,.xlsx,.sql">

<button onclick="uploadFile()">Upload</button>

</div>

<!-- DATASET PREVIEW -->

<div class="preview-section">

<h2>Dataset Preview</h2>

<div class="table-container">

<table id="dataTable">
<thead></thead>
<tbody></tbody>
</table>

</div>

</div>

<div class="pagination">

<button onclick="prevPage()">Previous</button>

<span id="pageInfo">Page 1</span>

<button onclick="nextPage()">Next</button>

</div>


<!-- KPI CARDS -->
<div class="data-overview">

<h2>Data Overview</h2>

<div class="kpi-container">

<div class="kpi-card dataset-card">

<h3>Dataset</h3>

<p id="fileName">No file</p>

<p class="dataset-meta">
<span id="fileSize">0 KB</span> • <span id="fileType">-</span>
</p>

</div>

<div class="kpi-card">
<h3>Total Rows</h3>
<p id="totalRows">0</p>
</div>

<div class="kpi-card">
<h3>Total Columns</h3>
<p id="totalColumns">0</p>
</div>

<div class="kpi-card">
<h3>Missing Values</h3>
<p id="missingValues">0</p>
</div>

<div class="kpi-card">
<h3>Duplicate Rows</h3>
<p id="duplicateRows">0</p>
</div>

<div class="kpi-card">
<h3>Numeric Columns</h3>
<p id="numericColumns">0</p>
</div>

<div class="kpi-card">
<h3>Categorical Columns</h3>
<p id="categoricalColumns">0</p>
</div>

</div>

</div>


<!-- connect JavaScript -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="script.js"></script>

</body>
</html>
