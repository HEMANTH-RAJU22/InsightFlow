<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - InsightFlow</title>
<style>
    /* CSS STYLES */
    :root {
        --primary-color: #4f46e5; /* Indigo */
        --secondary-color: #1e1b4b; /* Dark Navy */
        --bg-color: #f3f4f6;
        --text-color: #1f2937;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .login-container {
        background: white;
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    .logo {
        font-size: 2rem;
        font-weight: 700;
        color: var(--secondary-color);
        margin-bottom: 0.5rem;
        letter-spacing: -0.5px;
    }

    .subtitle {
        color: #6b7280;
        font-size: 0.9rem;
        margin-bottom: 2rem;
    }

    input {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 1rem;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        box-sizing: border-box; /* Ensures padding doesn't break width */
        font-size: 1rem;
        transition: border-color 0.2s;
    }

    input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
        margin-bottom: 0.5rem;
    }

    button:hover {
        opacity: 0.9;
    }

    .register-btn {
        background-color: transparent;
        color: var(--primary-color);
        border: 1px solid var(--primary-color);
    }

    .login-btn {
        background-color: var(--primary-color);
        color: white;
    }
</style>
</head>

<body>

<div class="login-container">
    <h1 class="logo">InsightFlow</h1>
    <p class="subtitle">AI Powered Data Insights</p>

    <input type="text" id="nameInput" placeholder="Full Name">
    <input type="email" id="emailInput" placeholder="Email Address">
    <input type="password" id="passwordInput" placeholder="Password">

    <button class="register-btn" onclick="register()">Create Account</button>
    <button class="login-btn" onclick="login()">Sign In</button>
</div>

<script>
    // JAVASCRIPT LOGIC
    function login() {
        const email = document.getElementById('emailInput').value;
        const password = document.getElementById('passwordInput').value;

        if(email && password) {
            alert(`Logging in as: ${email}`);
            // Here you would normally send data to your backend
        } else {
            alert("Please fill in all fields.");
        }
    }

    function register() {
        const name = document.getElementById('nameInput').value;
        const email = document.getElementById('emailInput').value;
        
        if(name && email) {
            alert(`Registration started for: ${name}`);
        } else {
            alert("Please fill in your name and email.");
        }
    }
</script>

</body>
</html>
