<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - InsightFlow</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">

<h2 id="formTitle">Login</h2>

<input type="text" id="nameInput" placeholder="Name" style="display:none">

<input type="email" id="emailInput" placeholder="Email">

<input type="password" id="passwordInput" placeholder="Password">

<button id="mainButton" class="login-btn" onclick="login()">Login</button>

<p id="toggleText">
Don't have an account? <span onclick="toggleForm()">Register</span>
</p>

</div>

<script src="script.js"></script>

</body>
</html>
