<!DOCTYPE html>
<html lang="en">
<head>
<script src="auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report — InsightFlow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="style.css">
<style>
body.report-body{display:flex!important;flex-direction:column!important;height:100vh!important;overflow:hidden!important;background:#0b0f1a!important;animation:none!important;margin:0!important;font-family:Arial,Helvetica,sans-serif!important}
body.report-body::before,body.report-body::after{display:none!important}
.r-topbar{height:60px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 50px;background:rgba(31,42,64,0.97);border-bottom:1px solid rgba(255,255,255,0.07);z-index:100;box-sizing:border-box}
.r-logo{font-size:24px;font-weight:bold;letter-spacing:2px;background:linear-gradient(90deg,#ff8c00,#ffb347,#ff8c00);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:logoGlow 6s linear infinite;cursor:pointer}
.r-nav{display:flex;gap:25px;align-items:center}
.r-nav span{font-size:16px;cursor:pointer;letter-spacing:1px;padding:5px 10px;background:linear-gradient(90deg,#ff8c00,#ffb347,#ff8c00);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;transition:.3s;font-family:Arial,Helvetica,sans-serif}
.r-nav span:hover{animation:logoGlow 4s linear infinite;transform:scale(1.05)}
.r-body{flex:1;display:flex;overflow:hidden;min-height:0;max-height:calc(100vh - 60px)}
.r-sidebar{width:210px;flex-shrink:0;background:linear-gradient(180deg,#0d1626 0%,#080e1c 100%);border-right:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;position:relative}
.r-sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ff8c00,#ffb347,#ff5500,transparent);z-index:2}
.r-sidebar::-webkit-scrollbar{width:0px}
.r-sidebar::-webkit-scrollbar-thumb{background:rgba(255,140,0,.2);border-radius:4px}
.r-sb-brand{padding:12px 14px 10px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:12px;background:rgba(255,140,0,.025)}
.r-sb-brand-icon{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#ff8c00,#ff5500);display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 6px 20px rgba(255,140,0,.45),0 0 0 1px rgba(255,140,0,.18)}
.r-sb-brand-title{font-size:14px;font-weight:700;color:white;margin-bottom:3px;letter-spacing:.2px}
.r-sb-brand-sub{font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:#ff8c00;opacity:.7}
.r-sb-sec{padding:10px 14px 5px;font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.15);display:flex;align-items:center;gap:8px}
.r-sb-sec::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.05)}
.r-sb-chips{padding:0 8px;display:flex;flex-direction:column;gap:2px}
.r-sb-chip{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:11px;font-size:13px;font-weight:600;color:rgba(255,255,255,.28);cursor:pointer;transition:all .16s;border:1px solid transparent;background:transparent;font-family:Arial,Helvetica,sans-serif;position:relative;overflow:hidden}
.r-sb-chip::before{content:'';position:absolute;left:0;top:15%;bottom:15%;width:3px;border-radius:0 3px 3px 0;background:#ff8c00;opacity:0;transition:opacity .16s}
.chip-ico{width:24px;height:24px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.r-sb-chip-count{margin-left:auto;font-size:11px;font-weight:700;color:rgba(255,255,255,.18);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);padding:2px 8px;border-radius:20px;min-width:24px;text-align:center}
.r-sb-chip:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.07)}
.r-sb-chip:hover .chip-ico{background:rgba(255,255,255,.09)}
.r-sb-chip.on{background:linear-gradient(135deg,rgba(255,140,0,.16),rgba(255,80,0,.07));border-color:rgba(255,140,0,.28);color:#ff8c00;box-shadow:inset 0 1px 0 rgba(255,180,0,.1)}
.r-sb-chip.on::before{opacity:1}
.r-sb-chip.on .chip-ico{background:rgba(255,140,0,.2);border-color:rgba(255,140,0,.25)}
.r-sb-chip.on .r-sb-chip-count{color:#ff8c00;background:rgba(255,140,0,.15);border-color:rgba(255,140,0,.25)}
.r-sb-div{height:1px;background:rgba(255,255,255,.04);margin:5px 12px}
.r-sb-stats{padding:0 8px;display:grid;grid-template-columns:1fr 1fr;gap:5px}
.r-sb-stat{display:flex;flex-direction:column;align-items:flex-start;padding:8px 10px 7px;border-radius:11px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);transition:all .2s;position:relative;overflow:hidden}
.r-sb-stat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#ff8c00,transparent);opacity:.3;transition:opacity .2s}
.r-sb-stat:hover{background:rgba(255,140,0,.06);border-color:rgba(255,140,0,.2);transform:translateY(-1px)}
.r-sb-stat:hover::after{opacity:.7}
.r-sb-stat-val{font-size:20px;font-weight:800;color:#ff8c00;line-height:1;letter-spacing:-1px;margin-bottom:5px}
.r-sb-stat-lbl{font-size:9px;color:rgba(255,255,255,.2);font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
.r-sb-actions{padding:0 8px;display:flex;flex-direction:column;gap:5px}
.r-sb-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 12px;border-radius:9px;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .22s;border:none;font-family:Arial,Helvetica,sans-serif;width:100%}
.r-sb-btn-pdf{background:linear-gradient(135deg,#ff8c00,#ff5500);color:white;box-shadow:0 4px 18px rgba(255,140,0,.4),0 0 0 1px rgba(255,160,0,.15)}
.r-sb-btn-pdf:hover{background:linear-gradient(135deg,#ffab40,#ff8c00);box-shadow:0 8px 26px rgba(255,140,0,.6);transform:translateY(-2px)}
.r-sb-btn-print{background:rgba(255,140,0,.08);color:#ff8c00;border:1px solid rgba(255,140,0,.32)!important}
.r-sb-btn-print:hover{background:rgba(255,140,0,.18);color:white;border-color:#ff8c00!important;transform:translateY(-1px)}
.r-sb-live{margin-top:auto;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.05);background:rgba(16,185,129,.025)}
.r-sb-live-left{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#10b981}
.r-ldot{width:7px;height:7px;border-radius:50%;background:#10b981;box-shadow:0 0 8px #10b981;animation:rBlink 2s infinite;flex-shrink:0}
.r-sb-live-time{font-size:10px;color:rgba(255,255,255,.2);font-weight:500;font-family:Arial,Helvetica,sans-serif}
@keyframes rBlink{0%,100%{opacity:1;box-shadow:0 0 10px #10b981}50%{opacity:.25;box-shadow:none}}
.r-canvas{flex:1;overflow-y:scroll;overflow-x:hidden;padding:12px 16px;display:flex;flex-direction:column;background:#0b0f1a;min-width:0;gap:10px}
.r-canvas::-webkit-scrollbar{width:0px}
.r-canvas::-webkit-scrollbar-thumb{background:transparent}
.r-kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.r-kpi{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 12px;box-shadow:0 8px 28px rgba(0,0,0,.4);position:relative;overflow:hidden;transition:all .2s;cursor:default}
.r-kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,#ff8c00);opacity:.7;border-radius:14px 14px 0 0}
.r-kpi::after{content:'';position:absolute;top:-25px;right:-15px;width:65px;height:65px;border-radius:50%;background:var(--ac,#ff8c00);opacity:.04;pointer-events:none}
.r-kpi:hover{transform:translateY(-3px);border-color:rgba(255,140,0,.22);box-shadow:0 12px 36px rgba(0,0,0,.5)}
.r-kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.r-kpi-ico{font-size:18px}
.r-kpi-tag{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#445;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);padding:2px 7px;border-radius:20px}
.r-kpi-lbl{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#445;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.r-kpi-val{font-size:22px;font-weight:bold;line-height:1;letter-spacing:-1px;margin-bottom:4px;transition:.3s}
.r-kpi-meta{font-size:9px;color:#445;margin-bottom:8px}
.r-kpi-tr{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.t-up{background:rgba(16,185,129,.1);color:#10b981}
.t-dn{background:rgba(239,68,68,.1);color:#ef4444}
.t-fl{background:rgba(136,153,170,.07);color:#778}
.r-g-main{display:grid;grid-template-columns:2fr 1fr;gap:8px}
.r-g-mid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.r-g-bot{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.r-g-extra{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.r-g-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.r-cc{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 12px;box-shadow:0 8px 28px rgba(0,0,0,.3);display:flex;flex-direction:column;transition:border-color .2s;min-width:0;overflow:hidden}
.r-cc:hover{border-color:rgba(255,255,255,.14)}
.r-cc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-shrink:0;gap:8px}
.r-cc-ttl{font-size:12px;font-weight:700;color:#99a;letter-spacing:.4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;letter-spacing:.3px}
.r-badge{font-size:10px;font-weight:700;letter-spacing:.8px;padding:3px 10px;border-radius:20px;text-transform:uppercase;flex-shrink:0}
.b-bar{background:rgba(255,140,0,.1);color:#ff8c00;border:1px solid rgba(255,140,0,.25)}
.b-line{background:rgba(59,130,246,.1);color:#3b82f6;border:1px solid rgba(59,130,246,.25)}
.b-pie{background:rgba(236,72,153,.1);color:#ec4899;border:1px solid rgba(236,72,153,.25)}
.b-area{background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.25)}
.b-scat{background:rgba(139,92,246,.1);color:#8b5cf6;border:1px solid rgba(139,92,246,.25)}
.b-polar{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.25)}
.b-radar{background:rgba(168,85,247,.1);color:#a855f7;border:1px solid rgba(168,85,247,.25)}
.b-hist{background:rgba(6,182,212,.1);color:#06b6d4;border:1px solid rgba(6,182,212,.25)}
.b-stack{background:rgba(251,146,60,.1);color:#fb923c;border:1px solid rgba(251,146,60,.25)}
.b-multi{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(34,211,153,.25)}
.b-stat{background:rgba(99,102,241,.1);color:#6366f1;border:1px solid rgba(99,102,241,.25)}
/* stat summary cards */
.r-stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:6px;transition:all .2s;position:relative;overflow:hidden}
.r-stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--sc,#6366f1);border-radius:14px 14px 0 0}
.r-stat-card:hover{border-color:rgba(255,255,255,.14);transform:translateY(-2px)}
.r-stat-card-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#445}
.r-stat-card-val{font-size:30px;font-weight:800;color:var(--sc,#6366f1);line-height:1;letter-spacing:-1.5px}
.r-stat-card-sub{font-size:10px;color:#556}
.r-cvw{position:relative;flex-shrink:0}
.r-cvw canvas{display:block;width:100%!important}
#rNoData{display:none;height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:18px;text-align:center}
#rNoData .ic{font-size:56px;opacity:.3}
#rNoData h2{font-size:20px;font-weight:700;color:white}
#rNoData p{color:#aaa;font-size:14px}
#rNoData a{background:#ff8c00;color:white;padding:11px 28px;border-radius:6px;text-decoration:none;font-weight:600;font-size:14px;transition:all .2s}
#rNoData a:hover{background:#ffa733;transform:translateY(-2px)}
@media print{
  @page{size:A3 landscape;margin:4mm}
  *{box-sizing:border-box!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body.report-body{background:#0b0f1a!important;overflow:visible!important;height:auto!important;display:block!important;margin:0!important;color:#e0e0e0!important}
  .r-topbar,.r-sidebar{display:none!important}
  .r-body{display:block!important;overflow:visible!important}
  .r-canvas{overflow:visible!important;padding:3mm!important;background:#0b0f1a!important;display:block!important;gap:4px!important;width:100%!important;height:auto!important;max-height:none!important}
  .r-kpi-row{display:grid!important;grid-template-columns:repeat(5,1fr)!important;gap:4px!important;margin-bottom:5px!important}
  .r-kpi{padding:7px 9px!important;border:1px solid rgba(255,140,0,.2)!important;background:#13171f!important;box-shadow:none!important;break-inside:avoid!important}
  .r-kpi-val{font-size:15px!important;color:#ff8c00!important}
  .r-kpi-lbl{font-size:7px!important;color:#aaa!important}
  .r-kpi-meta{font-size:7px!important;color:#666!important}
  .r-kpi-tr{font-size:8px!important;padding:1px 5px!important}
  .r-g-main{display:grid!important;grid-template-columns:2fr 1fr!important;gap:5px!important;margin-bottom:5px!important;break-inside:avoid!important}
  .r-g-mid{display:grid!important;grid-template-columns:1fr 1fr 1fr!important;gap:5px!important;margin-bottom:5px!important;break-inside:avoid!important}
  .r-g-bot{display:grid!important;grid-template-columns:1fr 1fr 1fr!important;gap:5px!important;margin-bottom:5px!important;break-inside:avoid!important}
  .r-g-extra{display:grid!important;grid-template-columns:3fr 2fr!important;gap:5px!important;margin-bottom:5px!important;break-inside:avoid!important}
  .r-g-stats{display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:5px!important;break-inside:avoid!important}
  .r-stat-card{border:1px solid rgba(255,255,255,.08)!important;background:#13171f!important;box-shadow:none!important;break-inside:avoid!important}
  .r-stat-card-val{color:var(--sc,#6366f1)!important}
  .r-stat-card-lbl,.r-stat-card-sub{color:#666!important}
  .r-cc{border:1px solid rgba(255,255,255,.08)!important;background:#13171f!important;box-shadow:none!important;padding:7px!important;break-inside:avoid!important}
  .r-cc-ttl{color:#aaa!important;font-size:9px!important}
  .r-cvw{height:130px!important}
  .r-cvw canvas{height:130px!important}
  html,body,.r-canvas{page-break-after:avoid!important;page-break-before:avoid!important}
  .r-kpi-row,.r-g-main,.r-g-mid,.r-cc,.r-kpi{page-break-inside:avoid!important}
  .r-canvas::before{content:'INSIGHTFLOW — Dashboard Report';display:block!important;font-size:13px!important;font-weight:800!important;color:#ff8c00!important;margin-bottom:6mm!important;letter-spacing:2px!important;text-transform:uppercase!important}
}
</style>
</head>
<body class="report-body">
<div id="rNoData">
  <div class="ic">📂</div>
  <h2>No Dataset Loaded</h2>
  <p>Upload a dataset on the dashboard first.</p>
  <a href="dashboard.html">← Back to Dashboard</a>
</div>
<div id="rApp" style="display:none">
  <div class="r-topbar">
    <div class="r-logo" onclick="window.location.href='dashboard.html'">INSIGHTFLOW</div>
    <div class="r-nav">
      <span onclick="window.location.href='dashboard.html'">← Dashboard</span>
      <span onclick="window.location.href='account.html'">Account</span>
      <span onclick="logout()">Logout</span>
    </div>
  </div>
  <div class="r-body">
    <div class="r-sidebar">
      <div class="r-sb-brand">
        <div class="r-sb-brand-icon">📊</div>
        <div>
          <div class="r-sb-brand-title">Data Report</div>
          <div class="r-sb-brand-sub">Auto Dashboard</div>
        </div>
      </div>
      <div class="r-sb-sec">Views</div>
      <div class="r-sb-chips">
        <div class="r-sb-chip on" onclick="setView(this,'all')"><div class="chip-ico">📊</div><span>All Metrics</span><span class="r-sb-chip-count" id="countAll">—</span></div>
        <div class="r-sb-chip" onclick="setView(this,'numeric')"><div class="chip-ico">🔢</div><span>Numeric</span><span class="r-sb-chip-count" id="countNum">—</span></div>
        <div class="r-sb-chip" onclick="setView(this,'category')"><div class="chip-ico">🏷️</div><span>Categories</span><span class="r-sb-chip-count" id="countCat">—</span></div>
        <div class="r-sb-chip" onclick="setView(this,'trends')"><div class="chip-ico">📈</div><span>Trends</span><span class="r-sb-chip-count">5</span></div>
      </div>
      <div class="r-sb-div"></div>
      <div class="r-sb-sec">Dataset</div>
      <div class="r-sb-stats">
        <div class="r-sb-stat"><span class="r-sb-stat-val" id="sbRows">—</span><span class="r-sb-stat-lbl">Rows</span></div>
        <div class="r-sb-stat"><span class="r-sb-stat-val" id="sbCols">—</span><span class="r-sb-stat-lbl">Cols</span></div>
        <div class="r-sb-stat"><span class="r-sb-stat-val" id="sbNum">—</span><span class="r-sb-stat-lbl">Numeric</span></div>
        <div class="r-sb-stat"><span class="r-sb-stat-val" id="sbCat">—</span><span class="r-sb-stat-lbl">Categ.</span></div>
      </div>
      <div class="r-sb-div"></div>
      <div class="r-sb-sec">Export</div>
      <div class="r-sb-actions">
        <button class="r-sb-btn r-sb-btn-pdf" id="pdfBtn" onclick="exportPDF()">↓ Export PDF</button>
        <button class="r-sb-btn r-sb-btn-print" onclick="printReport()">🖨 Print Report</button>
      </div>
      <div class="r-sb-live">
        <div class="r-sb-live-left"><div class="r-ldot"></div>Live</div>
        <div class="r-sb-live-time" id="sbTime">—</div>
      </div>
    </div>
    <div class="r-canvas" id="rCanvas">
      <div class="r-kpi-row" id="rKpi"></div>
      <div class="r-g-main"  id="rGMain"></div>
      <div class="r-g-mid"   id="rGMid"></div>
      <div class="r-g-bot"   id="rGBot"></div>
      <div class="r-g-extra" id="rGExtra"></div>
      <div class="r-g-stats" id="rGStats"></div>
    </div>
  </div>
</div>
<script>
var H=[],D=[],charts=[],fileName='Report'
var PAL=["#ff8c00","#3b82f6","#10b981","#ec4899","#8b5cf6","#f59e0b","#06b6d4","#ef4444","#84cc16","#a855f7"]
var ICONS=["📊","💰","📈","🎯","⚡","🔢","📦","🌟","💎","🔑"]
var GEN=(function(){var c=[],g=137.508;for(var i=0;i<500;i++){var h=(i*g)%360,s=62+(i%6)*5,l=50+(i%5)*4;c.push('hsl('+h.toFixed(1)+','+s+'%,'+l+'%)')}return c})()
function isNum(i){var v=D.map(function(r){return r[i]}).filter(function(x){return x!==''&&x!=null});return v.map(parseFloat).filter(function(n){return !isNaN(n)}).length>v.length*0.5}
function nIdx(){return H.map(function(_,i){return i}).filter(isNum)}
function cIdx(){return H.map(function(_,i){return i}).filter(function(i){return !isNum(i)})}
function stats(i){var v=D.map(function(r){return parseFloat(r[i])}).filter(function(n){return !isNaN(n)});if(!v.length)return null;var s=v.reduce(function(a,b){return a+b},0);return{min:Math.min.apply(null,v),max:Math.max.apply(null,v),avg:s/v.length,sum:s,count:v.length}}
function topN(i,n){var c={};D.forEach(function(r){var v=String(r[i]||'');c[v]=(c[v]||0)+1});return Object.entries(c).sort(function(a,b){return b[1]-a[1]}).slice(0,n||8)}

  if (window.Auth) {
    window.Auth.logout()
