<!DOCTYPE html>
<html lang="en">
<head>
<script src="auth.js" data-public></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsightFlow — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:       #07090d;
  --surface:  #0d1018;
  --gold:     #f5c842;
  --gold2:    #d9a020;
  --gold-dim: rgba(245,200,66,.1);
  --border:   rgba(255,255,255,.07);
  --border-g: rgba(245,200,66,.14);
  --text:     #ede8d8;
  --text2:    rgba(237,232,216,.42);
  --text3:    rgba(237,232,216,.22);
  --red:      #ef4444;
  --green:    #22c55e;
  --serif:    'DM Serif Display', Georgia, serif;
  --sans:     'DM Sans', system-ui, sans-serif;
}

html, body {
  height:100%; width:100%; overflow:hidden;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
}

/* ─── Background ─── */
.bg { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }

.bg-grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(245,200,66,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,200,66,.025) 1px, transparent 1px);
  background-size: 56px 56px;
}

.bg-orb {
  position:absolute; border-radius:50%;
  filter: blur(100px); pointer-events:none;
}
.orb1 { width:500px; height:500px; background:#b87a10; top:-160px; right:-80px;  opacity:.14; }
.orb2 { width:350px; height:350px; background:#7c5008; bottom:-120px; left:-60px; opacity:.10; }
.orb3 { width:220px; height:220px; background:#f5c842; top:42%;  left:38%;       opacity:.05; }

.bg-streak {
  position:absolute; width:1px; background:linear-gradient(to bottom, transparent 0%, rgba(245,200,66,.18) 50%, transparent 100%);
  animation: streak 10s ease-in-out infinite;
}
.streak-a { height:60%; top:0; left:22%;  animation-delay:0s; }
.streak-b { height:45%; top:20%; left:68%; animation-delay:5s; }
@keyframes streak { 0%,100%{opacity:0;transform:translateY(-5%)} 50%{opacity:1;transform:translateY(5%)} }

/* ─── Page ─── */
.page {
  position:fixed; inset:0; z-index:1;
  display:flex; align-items:center; justify-content:center;
  padding:20px;
}

/* ─── Card ─── */
.auth-card {
  position:relative;
  width:100%; max-width:448px;
  max-height:calc(100vh - 40px);
  display:flex; flex-direction:column;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius:24px;
  overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(245,200,66,.05),
    0 40px 100px rgba(0,0,0,.75),
    inset 0 1px 0 rgba(255,255,255,.04);
  animation: cardIn .65s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(28px) scale(.96); }
  to   { opacity:1; transform:none; }
}

/* gold top accent */
.auth-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent 5%, rgba(245,200,66,.6) 40%, rgba(245,200,66,.6) 60%, transparent 95%);
  z-index:2;
}

/* ─── Header ─── */
.card-header {
  padding:28px 32px 0; flex-shrink:0;
  animation: fadeUp .5s .08s both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:none; }
}

.logo { display:flex; align-items:center; gap:10px; margin-bottom:22px; }
.logo-icon {
  width:32px; height:32px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  box-shadow:0 4px 12px rgba(245,200,66,.3);
}
.logo-icon svg { width:17px; height:17px; }
.logo-text { font-family:var(--serif); font-size:16px; color:var(--gold); letter-spacing:.4px; }

.card-title {
  font-family:var(--serif);
  font-size:27px; font-weight:400;
  color:var(--text); letter-spacing:-.4px;
  margin-bottom:5px; line-height:1.2;
}
.card-sub { font-size:13px; color:var(--text2); font-weight:300; letter-spacing:.1px; }

/* ─── Tabs ─── */
.tabs {
  display:flex; gap:3px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:12px; padding:4px;
  margin:20px 32px 0; flex-shrink:0;
  animation: fadeUp .5s .14s both;
}
.tab {
  flex:1; padding:9px 12px;
  border-radius:9px; border:none; cursor:pointer;
  font-size:13px; font-weight:500;
  font-family:var(--sans); color:var(--text3);
  background:transparent; transition:all .22s; letter-spacing:.1px;
}
.tab.active {
  background:var(--gold-dim);
  color:var(--gold);
  border:1px solid var(--border-g);
  box-shadow:0 0 18px rgba(245,200,66,.07);
}

/* ─── Form scroll ─── */
.form-scroll {
  flex:1; overflow-y:auto; overflow-x:hidden;
  display:flex; flex-direction:column;
  scrollbar-width:thin; scrollbar-color:rgba(245,200,66,.15) transparent;
}
.form-scroll::-webkit-scrollbar { width:3px; }
.form-scroll::-webkit-scrollbar-thumb { background:rgba(245,200,66,.15); border-radius:2px; }

.form-body {
  padding:20px 32px 26px;
  display:flex; flex-direction:column; flex:1;
  animation: fadeUp .5s .2s both;
}

/* ─── Inputs ─── */
.form-group { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }

.form-label {
  font-size:10px; font-weight:600;
  letter-spacing:1.2px; text-transform:uppercase; color:var(--text3);
}

.form-input-wrap { position:relative; }

.form-input {
  width:100%; padding:11px 14px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:11px;
  color:var(--text); font-size:13.5px;
  font-family:var(--sans); font-weight:400;
  transition:border-color .2s, background .2s, box-shadow .2s;
  outline:none; letter-spacing:.1px;
}
.form-input::placeholder { color:var(--text3); }
.form-input:focus {
  border-color:rgba(245,200,66,.38);
  background:rgba(245,200,66,.025);
  box-shadow:0 0 0 3px rgba(245,200,66,.07);
}
.form-input.err {
  border-color:rgba(239,68,68,.4);
  background:rgba(239,68,68,.04);
  box-shadow:0 0 0 3px rgba(239,68,68,.06);
}
.form-input.ok {
  border-color:rgba(34,197,94,.35);
  box-shadow:0 0 0 3px rgba(34,197,94,.05);
}

.pw-eye {
  position:absolute; right:13px; top:50%; transform:translateY(-50%);
  cursor:pointer; opacity:.28; font-size:14px;
  user-select:none; color:var(--text);
  transition:opacity .2s;
}
.pw-eye:hover { opacity:.65; }

.val-msg {
  font-size:11px; font-weight:500;
  max-height:0; overflow:hidden;
  transition:max-height .18s, padding .18s;
  border-radius:7px;
}
.val-msg.show { max-height:30px; padding:4px 10px; margin-top:3px; }
.val-msg.err { background:rgba(239,68,68,.08); color:#ef4444; border:1px solid rgba(239,68,68,.18); }
.val-msg.ok  { background:rgba(34,197,94,.07);  color:#22c55e; border:1px solid rgba(34,197,94,.18); }

/* ─── Form row ─── */
.form-row {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:18px;
}
.remember { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
.remember input[type=checkbox] { width:14px; height:14px; accent-color:var(--gold); cursor:pointer; }
.remember span { font-size:12px; color:var(--text2); font-weight:300; }
.forgot { font-size:12px; color:var(--gold); cursor:pointer; opacity:.7; transition:opacity .2s; }
.forgot:hover { opacity:1; }

/* ─── Button ─── */
.submit-btn {
  width:100%; padding:12px;
  border-radius:11px; border:none; cursor:pointer;
  font-size:13.5px; font-weight:600;
  font-family:var(--sans); letter-spacing:.2px;
  background:linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  color:#07090d;
  box-shadow:0 4px 20px rgba(245,200,66,.22), inset 0 1px 0 rgba(255,255,255,.2);
  transition:all .22s; position:relative; overflow:hidden;
}
.submit-btn::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.12),transparent);
  opacity:1;
}
.submit-btn:hover:not(:disabled) {
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(245,200,66,.32), inset 0 1px 0 rgba(255,255,255,.2);
}
.submit-btn:active:not(:disabled) { transform:translateY(0); }
.submit-btn:disabled { opacity:.45; cursor:not-allowed; transform:none; }

.btn-text { position:relative; z-index:1; }
.btn-spinner {
  display:none; width:16px; height:16px; border-radius:50%;
  border:2px solid rgba(0,0,0,.2); border-top-color:#07090d;
  animation:spin .6s linear infinite; margin:0 auto;
  position:relative; z-index:1;
}
@keyframes spin { to { transform:rotate(360deg); } }
.submit-btn.loading .btn-text { display:none; }
.submit-btn.loading .btn-spinner { display:block; }

/* ─── Banners ─── */
.error-banner {
  padding:9px 13px; border-radius:10px; font-size:12px; font-weight:500;
  background:rgba(239,68,68,.08); color:#ef4444;
  border:1px solid rgba(239,68,68,.18);
  display:none; margin-bottom:12px; text-align:center;
  animation:shake .4s ease;
}
.error-banner.show { display:block; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

.success-banner {
  padding:9px 13px; border-radius:10px; font-size:12px; font-weight:500;
  background:rgba(34,197,94,.07); color:#22c55e;
  border:1px solid rgba(34,197,94,.18);
  display:none; margin-bottom:12px; text-align:center;
}
.success-banner.show { display:block; }

/* ─── Toggle ─── */
.toggle-row { text-align:center; margin-top:14px; font-size:12px; color:var(--text3); }
.toggle-row span { color:var(--gold); cursor:pointer; font-weight:500; transition:opacity .2s; }
.toggle-row span:hover { opacity:.8; }

/* ─── Strength ─── */
.strength-wrap { margin-top:5px; }
.strength-bar { height:3px; border-radius:2px; background:rgba(255,255,255,.06); overflow:hidden; }
.strength-fill { height:100%; border-radius:2px; transition:width .3s, background .3s; width:0; }
.strength-lbl { font-size:10px; color:var(--text3); margin-top:4px; font-weight:500; }

/* ─── Reveal box ─── */
.pw-reveal-box {
  margin-top:14px; padding:14px 16px;
  background:rgba(34,197,94,.05);
  border:1px solid rgba(34,197,94,.2);
  border-radius:12px;
}
.pw-reveal-label {
  font-size:9px; font-weight:700;
  letter-spacing:1.4px; text-transform:uppercase;
  color:rgba(34,197,94,.5); margin-bottom:7px;
}
.pw-reveal-row { display:flex; align-items:center; gap:8px; }
.pw-reveal-value {
  flex:1; font-size:14px; font-weight:600;
  color:#22c55e; letter-spacing:.5px; word-break:break-all;
  font-family:'Courier New',monospace;
}
.pw-copy-btn {
  padding:5px 11px; border-radius:7px;
  border:1px solid rgba(34,197,94,.25);
  background:rgba(34,197,94,.1); color:#22c55e;
  font-size:11px; font-weight:600; cursor:pointer;
  font-family:var(--sans); transition:all .18s; white-space:nowrap;
}
.pw-copy-btn:hover { background:rgba(34,197,94,.2); }
.pw-reveal-hint { font-size:10px; color:var(--text3); margin-top:8px; }

/* ─── New-password inputs inside forgot panel ─── */
.npw-input {
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 13px;
  color:var(--text); font-size:13px;
  font-family:var(--sans); outline:none;
  box-sizing:border-box;
  transition:border-color .2s, box-shadow .2s;
}
.npw-input:focus {
  border-color:rgba(245,200,66,.35);
  box-shadow:0 0 0 3px rgba(245,200,66,.06);
}

/* ─── Reset overlay ─── */
#resetSection {
  display:none; position:fixed; inset:0;
  background:rgba(7,9,13,.96);
  backdrop-filter:blur(14px);
  z-index:9999;
  align-items:center; justify-content:center;
}
#resetSection.show { display:flex; }
.reset-card {
  background:var(--surface);
  border:1px solid var(--border-g);
  border-radius:22px; padding:36px 32px;
  width:100%; max-width:400px; margin:20px;
  position:relative;
  box-shadow:0 40px 100px rgba(0,0,0,.7);
  animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;
}
.reset-card::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent 10%,rgba(245,200,66,.55) 45%,rgba(245,200,66,.55) 55%,transparent 90%);
  border-radius:22px 22px 0 0;
}

/* ─── Responsive ─── */
@media(max-height:680px) {
  .card-header { padding:18px 28px 0; }
  .card-title  { font-size:23px; }
  .tabs        { margin:14px 28px 0; }
  .form-body   { padding:14px 28px 18px; }
  .form-group  { margin-bottom:10px; }
  .form-input  { padding:9px 13px; }
}
@media(max-width:480px) {
  .auth-card   { border-radius:20px; }
  .card-header { padding:20px 22px 0; }
  .tabs        { margin:14px 22px 0; }
  .form-body   { padding:16px 22px 20px; }
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg">
  <div class="bg-grid"></div>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>
  <div class="bg-streak streak-a"></div>
  <div class="bg-streak streak-b"></div>
</div>

<div class="page">
  <div class="auth-card">

    <!-- Header -->
    <div class="card-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 17 17" fill="none">
            <rect x="1.5" y="9.5"  width="3" height="6"  rx="1" fill="#07090d"/>
            <rect x="7"   y="5.5"  width="3" height="10" rx="1" fill="#07090d"/>
            <rect x="12.5" y="1.5" width="3" height="14" rx="1" fill="#07090d"/>
            <circle cx="3"   cy="8"   r="1.4" fill="#07090d" opacity=".55"/>
            <circle cx="8.5" cy="4"   r="1.4" fill="#07090d" opacity=".55"/>
            <circle cx="14"  cy="0.5" r="1.4" fill="#07090d" opacity=".55"/>
          </svg>
        </div>
        <span class="logo-text">InsightFlow</span>
      </div>
      <div class="card-title" id="cardTitle">Welcome back</div>
      <div class="card-sub"  id="cardSub">Sign in to your InsightFlow account</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tabLogin"    onclick="switchTab('login')">Sign In</button>
      <button class="tab"        id="tabRegister" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm" class="form-scroll">
      <div class="form-body">
        <div class="error-banner"   id="errBanner"></div>
        <div class="success-banner" id="okBanner"></div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-input" type="email" id="lEmail" placeholder="you@example.com"
                 oninput="clearField('lEmail')">
          <div class="val-msg" id="lEmailMsg"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="form-input-wrap">
            <input class="form-input" type="password" id="lPass" placeholder="Enter your password"
                   oninput="clearField('lPass')" onkeydown="if(event.key==='Enter')doLogin()">
            <span class="pw-eye" onclick="toggleEye('lPass',this)">👁</span>
          </div>
          <div class="val-msg" id="lPassMsg"></div>
        </div>

        <div class="form-row">
          <label class="remember">
            <input type="checkbox" id="rememberMe" onchange="onRememberToggle()">
            <span>Remember me</span>
          </label>
          <span class="forgot" onclick="showForgot()">Forgot password?</span>
        </div>

        <button class="submit-btn" id="loginBtn" onclick="doLogin()">
          <span class="btn-text">Sign In</span>
          <div class="btn-spinner"></div>
        </button>
        <div class="toggle-row">Don't have an account? <span onclick="switchTab('register')">Create one free</span></div>
      </div>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="form-scroll" style="display:none">
      <div class="form-body">
        <div class="error-banner"   id="errBanner2"></div>
        <div class="success-banner" id="okBanner2"></div>

        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-input" type="text" id="rName" placeholder="Your name"
                 oninput="clearField('rName')">
          <div class="val-msg" id="rNameMsg"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-input" type="email" id="rEmail" placeholder="you@example.com"
                 oninput="clearField('rEmail')">
          <div class="val-msg" id="rEmailMsg"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="form-input-wrap">
            <input class="form-input" type="password" id="rPass" placeholder="At least 8 characters"
                   oninput="checkStrength(this.value);clearField('rPass')"
                   onkeydown="if(event.key==='Enter')doRegister()">
            <span class="pw-eye" onclick="toggleEye('rPass',this)">👁</span>
          </div>
          <div class="strength-wrap">
            <div class="strength-bar"><div class="strength-fill" id="strFill"></div></div>
            <div class="strength-lbl" id="strLbl">Enter a password</div>
          </div>
          <div class="val-msg" id="rPassMsg"></div>
        </div>

        <div class="form-group" style="margin-bottom:6px">
          <label class="form-label">Confirm Password</label>
          <div class="form-input-wrap">
            <input class="form-input" type="password" id="rConf" placeholder="Repeat your password"
                   oninput="clearField('rConf')" onkeydown="if(event.key==='Enter')doRegister()">
            <span class="pw-eye" onclick="toggleEye('rConf',this)">👁</span>
          </div>
          <div class="val-msg" id="rConfMsg"></div>
        </div>

        <button class="submit-btn" id="registerBtn" onclick="doRegister()" style="margin-top:8px">
          <span class="btn-text">Create Account</span>
          <div class="btn-spinner"></div>
        </button>
        <div class="toggle-row">Already have an account? <span onclick="switchTab('login')">Sign in</span></div>
      </div>
    </div>

  </div>
</div>

<!-- RESET OVERLAY -->
<div id="resetSection">
  <div class="reset-card">
    <div style="font-family:var(--serif);font-size:24px;color:var(--text);margin-bottom:5px">Reset Password</div>
    <p style="font-size:13px;color:var(--text2);font-weight:300;margin-bottom:24px">Enter your new password below.</p>
    <div style="margin-bottom:14px">
      <label style="font-size:10px;font-weight:600;letter-spacing:1.2px;color:var(--text3);text-transform:uppercase;display:block;margin-bottom:5px">New Password</label>
      <input id="resetPw1" type="password" placeholder="Min 6 characters" class="npw-input">
    </div>
    <div style="margin-bottom:20px">
      <label style="font-size:10px;font-weight:600;letter-spacing:1.2px;color:var(--text3);text-transform:uppercase;display:block;margin-bottom:5px">Confirm Password</label>
      <input id="resetPw2" type="password" placeholder="Repeat password" class="npw-input">
    </div>
    <div id="resetMsg" class="val-msg" style="margin-bottom:14px"></div>
    <button data-token="" onclick="submitReset()"
      style="width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07090d;border:none;padding:12px;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:var(--sans);letter-spacing:.2px;box-shadow:0 4px 20px rgba(245,200,66,.22)">
      Set New Password
    </button>
    <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--text3)">
      <span onclick="document.getElementById('resetSection').classList.remove('show')" style="color:var(--gold);cursor:pointer">Back to Sign In</span>
    </div>
  </div>
</div>

<script>
var API = 'http://127.0.0.1:5000'

/* ── Reset token ── */
window.addEventListener('load', function() {
  var params = new URLSearchParams(window.location.search)
  var token  = params.get('reset')
  if (token) {
    var rs = document.getElementById('resetSection')
    if (rs) {
      rs.classList.add('show')
      var btn = rs.querySelector('[data-token]')
      if (btn) btn.setAttribute('data-token', token)
    }
  }
})

function submitReset() {
  var el    = document.getElementById('resetSection')
  var token = el ? el.querySelector('[data-token]').getAttribute('data-token') : ''
  var pw1   = document.getElementById('resetPw1') ? document.getElementById('resetPw1').value : ''
  var pw2   = document.getElementById('resetPw2') ? document.getElementById('resetPw2').value : ''
  var msg   = document.getElementById('resetMsg')
  if (!pw1 || pw1.length < 6) { if(msg){msg.textContent='Password must be at least 6 characters';msg.className='val-msg show err'} return }
  if (pw1 !== pw2)             { if(msg){msg.textContent='Passwords do not match';msg.className='val-msg show err'} return }
  fetch(API+'/reset-password', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token:token,password:pw1}) })
  .then(function(r){ return r.json() })
  .then(function(data){
    if (data.status==='success') {
      if(msg){msg.textContent='Password reset! Redirecting...';msg.className='val-msg show ok'}
      setTimeout(function(){ window.location.href='login.html' }, 2000)
    } else {
      if(msg){msg.textContent=data.message||'Reset failed. Link may be expired.';msg.className='val-msg show err'}
    }
  })
  .catch(function(){ if(msg){msg.textContent='Connection error.';msg.className='val-msg show err'} })
}

/* ── Init ── */
window.addEventListener('DOMContentLoaded', function() {
  document.getElementById('lEmail').value = ''
  document.getElementById('rememberMe').checked = false
  var tab = sessionStorage.getItem('insightflow_tab')
  if (tab === 'register') { sessionStorage.removeItem('insightflow_tab'); switchTab('register') }
})

function onRememberToggle() {
  var cb = document.getElementById('rememberMe'), email = document.getElementById('lEmail')
  if (cb.checked) { var s=localStorage.getItem('insightflow_remember'); if(s) email.value=s }
  else { email.value=''; localStorage.removeItem('insightflow_remember') }
}

function clearField(id) {
  var inp=document.getElementById(id); if(inp) inp.className='form-input'
  var msg=document.getElementById(id+'Msg'); if(msg){msg.textContent='';msg.className='val-msg'}
  hideBanners()
}

function resetForm(formId) {
  var form=document.getElementById(formId); if(!form) return
  form.querySelectorAll('.form-input').forEach(function(inp){inp.value='';inp.className='form-input';inp.disabled=false})
  form.querySelectorAll('.val-msg').forEach(function(el){el.textContent='';el.className='val-msg'})
  var fill=document.getElementById('strFill'),lbl=document.getElementById('strLbl')
  if(fill) fill.style.width='0'
  if(lbl){lbl.textContent='Enter a password';lbl.style.color=''}
}

function switchTab(tab) {
  var isLogin=tab==='login'
  resetForm(isLogin?'loginForm':'registerForm')
  if(isLogin) document.getElementById('rememberMe').checked=false
  hideBanners()
  document.getElementById('loginForm').style.display    = isLogin?'flex':'none'
  document.getElementById('registerForm').style.display = isLogin?'none':'flex'
  document.getElementById('tabLogin').classList.toggle('active',isLogin)
  document.getElementById('tabRegister').classList.toggle('active',!isLogin)
  document.getElementById('cardTitle').textContent = isLogin?'Welcome back':'Create your account'
  document.getElementById('cardSub').textContent   = isLogin?'Sign in to your InsightFlow account':'Start analysing data in minutes'
}

function showErr(msg) {
  var id=document.getElementById('loginForm').style.display!=='none'?'errBanner':'errBanner2'
  var el=document.getElementById(id); if(!el) return
  el.textContent=msg; el.className='error-banner show'
  el.style.animation='none'; el.offsetHeight; el.style.animation=''
}
function showOk(msg) {
  var id=document.getElementById('loginForm').style.display!=='none'?'okBanner':'okBanner2'
  var el=document.getElementById(id); if(el){el.textContent=msg;el.className='success-banner show'}
}
function hideBanners() {
  ['errBanner','okBanner','errBanner2','okBanner2'].forEach(function(id){
    var el=document.getElementById(id)
    if(el) el.className=el.className.includes('error')?'error-banner':'success-banner'
  })
}

function setFieldState(id,state,msg) {
  var inp=document.getElementById(id),msgEl=document.getElementById(id+'Msg'); if(!inp) return
  inp.className='form-input'+(state==='err'?' err':state==='ok'?' ok':'')
  if(msgEl){msgEl.textContent=msg||'';msgEl.className='val-msg'+(msg?' show '+state:'')}
}

function checkStrength(v) {
  var fill=document.getElementById('strFill'),lbl=document.getElementById('strLbl')
  if(!v){fill.style.width='0';lbl.textContent='Enter a password';lbl.style.color='';return}
  var s=0
  if(v.length>=6)s++;if(v.length>=10)s++
  if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++
  var lvl=[
    {w:'20%',bg:'#ef4444',t:'Too weak'},{w:'40%',bg:'#f97316',t:'Weak'},
    {w:'60%',bg:'#f59e0b',t:'Fair'},{w:'80%',bg:'#84cc16',t:'Good'},{w:'100%',bg:'#22c55e',t:'Strong'}
  ][Math.min(s-1,4)]||{w:'20%',bg:'#ef4444',t:'Too weak'}
  fill.style.width=lvl.w;fill.style.background=lvl.bg;lbl.textContent=lvl.t;lbl.style.color=lvl.bg
}

function toggleEye(id,btn) {
  var inp=document.getElementById(id)
  if(inp.type==='password'){inp.type='text';btn.style.opacity='.65'}
  else{inp.type='password';btn.style.opacity='.28'}
}

function setLoading(btnId,on) {
  var btn=document.getElementById(btnId); if(!btn) return
  btn.disabled=on; btn.classList.toggle('loading',on)
}

function doLogin() {
  hideBanners()
  var email=document.getElementById('lEmail').value.trim().toLowerCase()
  var pass=document.getElementById('lPass').value
  var ok=true
  if(!email){setFieldState('lEmail','err','Email is required');ok=false}
  else if(!/^[^@]+@[^@]+\.[^@]+$/.test(email)){setFieldState('lEmail','err','Enter a valid email');ok=false}
  if(!pass){setFieldState('lPass','err','Password is required');ok=false}
  if(!ok) return
  setLoading('loginBtn',true)
  var token=''
  try{var arr=new Uint8Array(32);window.crypto.getRandomValues(arr);token=Array.from(arr).map(function(b){return b.toString(16).padStart(2,'0')}).join('')}catch(e){}
  fetch(API+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pass,token:token})})
  .then(function(r){return r.json()})
  .then(function(data){
    setLoading('loginBtn',false)
    if(data.status==='success'){
      document.getElementById('rememberMe').checked
        ? localStorage.setItem('insightflow_remember',email)
        : localStorage.removeItem('insightflow_remember')
      if(window.Auth&&data.token){window.Auth.setSession(data.token)}
      else{localStorage.setItem('userEmail',data.email)}
      showOk('Login successful! Redirecting...')
      var dest='dashboard.html'
      try{dest=sessionStorage.getItem('insightflow_redirect')||'dashboard.html'}catch(e){}
      try{sessionStorage.removeItem('insightflow_redirect')}catch(e){}
      setTimeout(function(){window.location.href=dest},600)
    } else {
      setFieldState('lPass','err','')
      showErr(data.message||'Invalid email or password')
    }
  })
  .catch(function(){setLoading('loginBtn',false);showErr('Cannot reach server. Make sure Flask is running.')})
}

function doRegister() {
  hideBanners()
  var name=document.getElementById('rName').value.trim()
  var email=document.getElementById('rEmail').value.trim().toLowerCase()
  var pass=document.getElementById('rPass').value
  var conf=document.getElementById('rConf').value
  var ok=true
  if(!name||name.length<2){setFieldState('rName','err','Name must be at least 2 characters');ok=false}
  if(!email||!/^[^@]+@[^@]+\.[^@]+$/.test(email)){setFieldState('rEmail','err','Enter a valid email');ok=false}
  if(!pass||pass.length<6){setFieldState('rPass','err','Password must be at least 6 characters');ok=false}
  if(pass!==conf){setFieldState('rConf','err','Passwords do not match');ok=false}
  if(!ok) return
  setLoading('registerBtn',true)
  fetch(API+'/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,email:email,password:pass})})
  .then(function(r){return r.json()})
  .then(function(data){
    setLoading('registerBtn',false)
    if(data.status==='success'){
      showOk('Account created! Signing you in...')
      setTimeout(function(){
        resetForm('registerForm')
        document.getElementById('lEmail').value=email
        document.getElementById('lPass').value=pass
        switchTab('login')
        setTimeout(doLogin,300)
      },800)
    } else {showErr(data.message||'Registration failed')}
  })
  .catch(function(){setLoading('registerBtn',false);showErr('Cannot reach server. Make sure Flask is running.')})
}

/* ── Forgot ── */
function showForgot() {
  var tabs=document.querySelector('.tabs'),lf=document.getElementById('loginForm')
  var hdr=document.getElementById('cardTitle'),sub=document.getElementById('cardSub')
  if(tabs) tabs.style.display='none'
  if(lf)   lf.style.display='none'
  if(hdr)  hdr.textContent='Forgot Password'
  if(sub)  sub.textContent='Enter your email to retrieve your password'
  var ex=document.getElementById('forgotPanel'); if(ex) ex.remove()
  var panel=document.createElement('div')
  panel.id='forgotPanel'; panel.className='form-scroll'
  panel.innerHTML=
    '<div class="form-body" style="justify-content:flex-start">'+
      '<div class="form-group">'+
        '<label class="form-label">Email Address</label>'+
        '<input class="form-input" type="email" id="forgotEmail" placeholder="you@example.com" oninput="clearForgotState()">'+
        '<div class="val-msg" id="forgotMsg"></div>'+
      '</div>'+
      '<button class="submit-btn" id="forgotBtn" onclick="submitForgot()" style="margin-bottom:12px">'+
        '<span class="btn-text">Retrieve Password</span>'+
        '<div class="btn-spinner"></div>'+
      '</button>'+
      '<div id="pwReveal"></div>'+
      '<div class="toggle-row" style="margin-top:14px">Remember it? <span onclick="closeForgot()">Back to Sign In</span></div>'+
    '</div>'
  document.querySelector('.auth-card').appendChild(panel)
  setTimeout(function(){var e=document.getElementById('forgotEmail');if(e)e.focus()},50)
}

function clearForgotState() {
  var m=document.getElementById('forgotMsg'),e=document.getElementById('forgotEmail'),r=document.getElementById('pwReveal')
  if(m){m.textContent='';m.className='val-msg'}
  if(e) e.className='form-input'
  if(r) r.innerHTML=''
}

function closeForgot() {
  var panel=document.getElementById('forgotPanel'); if(panel) panel.remove()
  var tabs=document.querySelector('.tabs'),lf=document.getElementById('loginForm')
  var hdr=document.getElementById('cardTitle'),sub=document.getElementById('cardSub')
  if(tabs) tabs.style.display='flex'
  if(lf)   lf.style.display='flex'
  if(hdr)  hdr.textContent='Welcome back'
  if(sub)  sub.textContent='Sign in to your InsightFlow account'
}

function submitForgot() {
  var emailEl=document.getElementById('forgotEmail')
  var msgEl=document.getElementById('forgotMsg')
  var btn=document.getElementById('forgotBtn')
  var reveal=document.getElementById('pwReveal')
  if(!emailEl||!msgEl) return
  var val=emailEl.value.trim().toLowerCase()
  if(reveal) reveal.innerHTML=''
  msgEl.className='val-msg'
  if(!val||!/^[^@]+@[^@]+\.[^@]+$/.test(val)){
    emailEl.className='form-input err';msgEl.className='val-msg show err';msgEl.textContent='Enter a valid email address.'; return
  }
  emailEl.disabled=true
  if(btn){btn.disabled=true;btn.classList.add('loading')}
  fetch(API+'/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:val})})
  .then(function(r){return r.json()})
  .then(function(data){
    if(btn){btn.disabled=false;btn.classList.remove('loading')}
    emailEl.disabled=false
    if(data.status==='success'){
      emailEl.className='form-input ok'
      msgEl.className='val-msg show ok'
      msgEl.textContent='Email verified! Set your new password below.'
      if(reveal){
        reveal.innerHTML=
          '<div style="margin-top:12px;padding:16px;background:rgba(245,200,66,.05);border:1px solid rgba(245,200,66,.15);border-radius:12px">'+
            '<div style="margin-bottom:10px">'+
              '<label style="font-size:9px;font-weight:700;letter-spacing:1.2px;color:rgba(245,200,66,.45);text-transform:uppercase;display:block;margin-bottom:5px">New Password</label>'+
              '<input id="newPw1" type="password" placeholder="Min 6 characters" class="npw-input">'+
            '</div>'+
            '<div style="margin-bottom:12px">'+
              '<label style="font-size:9px;font-weight:700;letter-spacing:1.2px;color:rgba(245,200,66,.45);text-transform:uppercase;display:block;margin-bottom:5px">Confirm Password</label>'+
              '<input id="newPw2" type="password" placeholder="Repeat password" class="npw-input">'+
            '</div>'+
            '<div id="newPwMsg" style="font-size:11px;margin-bottom:10px;font-family:var(--sans)"></div>'+
            '<button onclick="submitNewPassword(\''+escHtml(val)+'\')" style="width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07090d;border:none;padding:11px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);letter-spacing:.2px;box-shadow:0 4px 16px rgba(245,200,66,.2)">Set New Password</button>'+
          '</div>'
      }
    } else {
      emailEl.className='form-input err'
      msgEl.className='val-msg show err'
      msgEl.textContent=data.message||'No account found with that email.'
    }
  })
  .catch(function(){
    if(btn){btn.disabled=false;btn.classList.remove('loading')}
    emailEl.disabled=false
    emailEl.className='form-input err';msgEl.className='val-msg show err';msgEl.textContent='Cannot reach server. Make sure Flask is running.'
  })
}

function submitNewPassword(email) {
  var pw1=document.getElementById('newPw1')?document.getElementById('newPw1').value:''
  var pw2=document.getElementById('newPw2')?document.getElementById('newPw2').value:''
  var msg=document.getElementById('newPwMsg')
  if(!pw1||pw1.length<6){if(msg){msg.textContent='Password must be at least 6 characters';msg.style.color='#ef4444'}return}
  if(pw1!==pw2){if(msg){msg.textContent='Passwords do not match';msg.style.color='#ef4444'}return}
  if(msg){msg.textContent='Updating...';msg.style.color='var(--gold)'}
  fetch(API+'/reset-password-direct',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pw1})})
  .then(function(r){return r.json()})
  .then(function(data){
    if(data.status==='success'){
      if(msg){msg.textContent='✓ Password updated! Redirecting...';msg.style.color='#22c55e'}
      setTimeout(function(){closeForgot();switchTab('login')},1800)
    } else {
      if(msg){msg.textContent=data.message||'Update failed.';msg.style.color='#ef4444'}
    }
  })
  .catch(function(){if(msg){msg.textContent='Connection error.';msg.style.color='#ef4444'}})
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
}
</script>
