<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsightFlow — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  height:100%;width:100%;overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
  background:linear-gradient(135deg,#0f172a,#1f2a40,#0f172a);
  background-size:400% 400%;
  animation:bgMove 12s infinite;
  color:white;
}
@keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes logoGlow{0%{background-position:0% center}100%{background-position:200% center}}

.page{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
}

.auth-card{
  width:400px;max-width:100%;
  max-height:calc(100vh - 32px);
  display:flex;flex-direction:column;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.09);
  border-radius:20px;
  box-shadow:0 24px 60px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04);
  overflow:hidden;
}

.card-header{padding:20px 28px 0;flex-shrink:0}
.card-title{font-size:20px;font-weight:700;color:white;letter-spacing:.2px;margin-bottom:4px}
.card-sub{font-size:12px;color:rgba(255,255,255,.35)}

.tabs{
  display:flex;gap:4px;background:rgba(255,255,255,.05);
  border-radius:10px;padding:4px;margin:12px 28px 0;flex-shrink:0;
}
.tab{
  flex:1;padding:8px;border-radius:7px;border:none;cursor:pointer;
  font-size:13px;font-weight:600;letter-spacing:.3px;
  color:rgba(255,255,255,.35);background:transparent;
  font-family:Arial,Helvetica,sans-serif;transition:all .2s;
}
.tab.active{background:rgba(255,140,0,.18);color:#ff8c00;border:1px solid rgba(255,140,0,.25)}

.form-scroll{flex:1;overflow:hidden;display:flex;flex-direction:column}
.form-body{padding:14px 28px 20px;display:flex;flex-direction:column;flex:1}

.form-group{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;flex-shrink:0}
.form-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3)}
.form-input-wrap{position:relative}
.form-input{
  width:100%;padding:8px 12px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:9px;color:white;font-size:13px;
  font-family:Arial,Helvetica,sans-serif;
  transition:border-color .2s,background .2s;outline:none;
}
.form-input:focus{border-color:rgba(255,140,0,.5);background:rgba(255,140,0,.04)}
.form-input.err{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.04)}
.form-input.ok{border-color:rgba(16,185,129,.4)}
.form-input::placeholder{color:rgba(255,255,255,.18)}
.pw-eye{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  cursor:pointer;opacity:.35;transition:opacity .2s;font-size:15px;user-select:none;
}
.pw-eye:hover{opacity:.7}

.val-msg{
  font-size:10px;font-weight:600;
  max-height:0;overflow:hidden;
  transition:max-height .18s ease,padding .18s ease;
  border-radius:6px;
}
.val-msg.show{max-height:28px;padding:4px 9px;margin-top:2px}
.val-msg.err{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.val-msg.ok{background:rgba(16,185,129,.08);color:#10b981;border:1px solid rgba(16,185,129,.2)}

.form-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-shrink:0}
.remember{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.remember input[type=checkbox]{width:14px;height:14px;accent-color:#ff8c00;cursor:pointer;flex-shrink:0}
.remember span{font-size:12px;color:rgba(255,255,255,.4)}
.forgot{font-size:11px;color:#ff8c00;cursor:pointer;opacity:.8;transition:opacity .2s}
.forgot:hover{opacity:1}

.submit-btn{
  width:100%;padding:10px;border-radius:9px;border:none;cursor:pointer;
  font-size:13px;font-weight:700;letter-spacing:.5px;
  font-family:Arial,Helvetica,sans-serif;
  background:linear-gradient(135deg,#ff8c00,#ff5500);color:white;
  box-shadow:0 4px 20px rgba(255,140,0,.4);
  transition:all .22s;position:relative;overflow:hidden;flex-shrink:0;
}
.submit-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,140,0,.55)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-spinner{
  display:none;width:15px;height:15px;border-radius:50%;
  border:2px solid rgba(255,255,255,.3);border-top-color:white;
  animation:spin .6s linear infinite;margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.submit-btn.loading .btn-text{display:none}
.submit-btn.loading .btn-spinner{display:block}

.error-banner{
  padding:7px 12px;border-radius:9px;font-size:11px;font-weight:600;
  background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2);
  display:none;margin-bottom:8px;text-align:center;animation:shake .4s ease;flex-shrink:0;
}
.error-banner.show{display:block}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.success-banner{
  padding:7px 12px;border-radius:9px;font-size:11px;font-weight:600;
  background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.2);
  display:none;margin-bottom:8px;text-align:center;flex-shrink:0;
}
.success-banner.show{display:block}

.toggle-row{text-align:center;margin-top:10px;font-size:11px;color:rgba(255,255,255,.35);flex-shrink:0}
.toggle-row span{color:#ff8c00;cursor:pointer;font-weight:600;transition:opacity .2s}
.toggle-row span:hover{opacity:.8}

.strength-wrap{margin-top:3px;flex-shrink:0}
.strength-bar{height:3px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden}
.strength-fill{height:100%;border-radius:3px;transition:width .3s,background .3s;width:0}
.strength-lbl{font-size:9px;color:rgba(255,255,255,.3);margin-top:3px;font-weight:600}

/* ── Password reveal box ── */
.pw-reveal-box{
  margin-top:14px;
  padding:14px 16px;
  background:rgba(16,185,129,.07);
  border:1px solid rgba(16,185,129,.25);
  border-radius:10px;
  flex-shrink:0;
}
.pw-reveal-label{
  font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(16,185,129,.6);margin-bottom:6px;
}
.pw-reveal-row{display:flex;align-items:center;gap:8px;}
.pw-reveal-value{
  flex:1;font-size:14px;font-weight:700;
  color:#10b981;letter-spacing:.5px;
  word-break:break-all;
}
.pw-copy-btn{
  padding:5px 10px;border-radius:6px;border:1px solid rgba(16,185,129,.3);
  background:rgba(16,185,129,.1);color:#10b981;
  font-size:11px;font-weight:700;cursor:pointer;
  font-family:Arial,Helvetica,sans-serif;
  transition:all .18s;white-space:nowrap;flex-shrink:0;
}
.pw-copy-btn:hover{background:rgba(16,185,129,.2)}
.pw-reveal-hint{
  font-size:10px;color:rgba(255,255,255,.25);margin-top:8px;
}

@media(max-height:620px){
  .card-header{padding:12px 24px 0}
  .card-title{font-size:17px;margin-bottom:2px}
  .tabs{margin:8px 24px 0}
  .form-body{padding:10px 24px 12px}
  .form-group{margin-bottom:5px}
  .form-input{padding:6px 11px;font-size:12px}
  .submit-btn{padding:8px}
  .toggle-row{margin-top:6px}
}
@media(max-width:440px){
  .auth-card{border-radius:16px}
  .card-header{padding:16px 18px 0}
  .tabs{margin:10px 18px 0}
  .form-body{padding:12px 18px 16px}
}
</style>
</head>
<body>

<div class="page">
  <div class="auth-card">

    <div class="card-header">
      <div style="font-size:16px;font-weight:900;letter-spacing:3px;background:linear-gradient(90deg,#ff8c00,#ffb347,#ff8c00);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:logoGlow 6s linear infinite;margin-bottom:8px">INSIGHTFLOW</div>
      <div class="card-title" id="cardTitle">Welcome back</div>
      <div class="card-sub"  id="cardSub">Sign in to your InsightFlow account</div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabLogin"    onclick="switchTab('login')">Sign In</button>
      <button class="tab"        id="tabRegister" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- ══ LOGIN FORM ══ -->
    <div id="loginForm" class="form-scroll">
      <div class="form-body">
        <div class="error-banner"   id="errBanner"></div>
        <div class="success-banner" id="okBanner"></div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-input" type="email" id="lEmail" placeholder="you@example.com"
                 oninput="clearField('lEmail')">
          <div class="val-msg" id="lEmailMsg"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="form-input-wrap">
            <input class="form-input" type="password" id="lPass" placeholder="Enter your password"
                   oninput="clearField('lPass')" onkeydown="if(event.key==='Enter')doLogin()">
            <span class="pw-eye" onclick="toggleEye('lPass',this)">👁</span>
          </div>
          <div class="val-msg" id="lPassMsg"></div>
        </div>

        <div class="form-row">
          <label class="remember">
            <input type="checkbox" id="rememberMe" onchange="onRememberToggle()">
            <span>Remember me</span>
          </label>
          <span class="forgot" onclick="showForgot()">Forgot password?</span>
        </div>

        <button class="submit-btn" id="loginBtn" onclick="doLogin()">
          <span class="btn-text">Sign In</span>
          <div class="btn-spinner"></div>
        </button>
        <div class="toggle-row">Don't have an account? <span onclick="switchTab('register')">Create one free</span></div>
      </div>
    </div>

    <!-- ══ REGISTER FORM ══ -->
    <div id="registerForm" class="form-scroll" style="display:none">
      <div class="form-body">
        <div class="error-banner"   id="errBanner2"></div>
        <div class="success-banner" id="okBanner2"></div>

        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-input" type="text" id="rName" placeholder="Your name"
                 oninput="clearField('rName')">
          <div class="val-msg" id="rNameMsg"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-input" type="email" id="rEmail" placeholder="you@example.com"
                 oninput="clearField('rEmail')">
          <div class="val-msg" id="rEmailMsg"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="form-input-wrap">
            <input class="form-input" type="password" id="rPass" placeholder="At least 6 characters"
                   oninput="checkStrength(this.value);clearField('rPass')"
                   onkeydown="if(event.key==='Enter')doRegister()">
            <span class="pw-eye" onclick="toggleEye('rPass',this)">👁</span>
          </div>
          <div class="strength-wrap">
            <div class="strength-bar"><div class="strength-fill" id="strFill"></div></div>
            <div class="strength-lbl" id="strLbl">Enter a password</div>
          </div>
          <div class="val-msg" id="rPassMsg"></div>
        </div>

        <div class="form-group" style="margin-bottom:8px">
          <label class="form-label">Confirm Password</label>
          <div class="form-input-wrap">
            <input class="form-input" type="password" id="rConf" placeholder="Repeat your password"
                   oninput="clearField('rConf')" onkeydown="if(event.key==='Enter')doRegister()">
            <span class="pw-eye" onclick="toggleEye('rConf',this)">👁</span>
          </div>
          <div class="val-msg" id="rConfMsg"></div>
        </div>

        <button class="submit-btn" id="registerBtn" onclick="doRegister()">
          <span class="btn-text">Create Account</span>
          <div class="btn-spinner"></div>
        </button>
        <div class="toggle-row">Already have an account? <span onclick="switchTab('login')">Sign in</span></div>
      </div>
    </div>

  </div>
</div>

<script>
var API = 'http://127.0.0.1:5000'

// Handle reset token in URL
window.addEventListener('load', function() {
  var params = new URLSearchParams(window.location.search)
  var token  = params.get('reset')
  if (token) {
    // Show reset password form
    document.getElementById('resetSection') && showResetForm(token)
  }
})

function showResetForm(token) {
  var el = document.getElementById('resetSection')
  if (!el) return
  el.style.display = 'block'
  document.querySelector('.tabs') && (document.querySelector('.tabs').style.display = 'none')
  document.getElementById('loginForm') && (document.getElementById('loginForm').style.display = 'none')
  document.getElementById('registerForm') && (document.getElementById('registerForm').style.display = 'none')
  document.getElementById('forgotForm') && (document.getElementById('forgotForm').style.display = 'none')
  el.querySelector('[data-token]') && el.querySelector('[data-token]').setAttribute('data-token', token)
}

function submitReset() {
  var el    = document.getElementById('resetSection')
  var token = el ? el.querySelector('[data-token]').getAttribute('data-token') : ''
  var pw1   = document.getElementById('resetPw1') ? document.getElementById('resetPw1').value : ''
  var pw2   = document.getElementById('resetPw2') ? document.getElementById('resetPw2').value : ''
  var msg   = document.getElementById('resetMsg')

  if (!pw1 || pw1.length < 6) { if(msg){msg.textContent='Password must be at least 6 characters';msg.className='val-msg show err'} return }
  if (pw1 !== pw2) { if(msg){msg.textContent='Passwords do not match';msg.className='val-msg show err'} return }

  fetch(API + '/reset-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: token, password: pw1 })
  })
  .then(function(r){ return r.json() })
  .then(function(data){
    if (data.status === 'success') {
      if(msg){msg.textContent='Password reset successfully! Redirecting to login...';msg.className='val-msg show ok'}
      setTimeout(function(){ window.location.href = 'login.html' }, 2000)
    } else {
      if(msg){msg.textContent=data.message||'Reset failed. Link may be expired.';msg.className='val-msg show err'}
    }
  })
  .catch(function(){ if(msg){msg.textContent='Connection error.';msg.className='val-msg show err'} })
}

window.addEventListener('DOMContentLoaded', function() {
  document.getElementById('lEmail').value = ''
  document.getElementById('rememberMe').checked = false
  var tab = sessionStorage.getItem('insightflow_tab')
  if (tab === 'register') { sessionStorage.removeItem('insightflow_tab'); switchTab('register') }
})

function onRememberToggle() {
  var cb    = document.getElementById('rememberMe')
  var email = document.getElementById('lEmail')
  if (cb.checked) {
    var saved = localStorage.getItem('insightflow_remember')
    if (saved) email.value = saved
  } else {
    email.value = ''
    localStorage.removeItem('insightflow_remember')
  }
}

function clearField(id) {
  var inp = document.getElementById(id); if (inp) inp.className = 'form-input'
  var msg = document.getElementById(id + 'Msg'); if (msg) { msg.textContent = ''; msg.className = 'val-msg' }
  hideBanners()
}

function resetForm(formId) {
  var form = document.getElementById(formId); if (!form) return
  form.querySelectorAll('.form-input').forEach(function(inp) {
    inp.value = ''; inp.className = 'form-input'; inp.disabled = false
  })
  form.querySelectorAll('.val-msg').forEach(function(el) { el.textContent = ''; el.className = 'val-msg' })
  var fill = document.getElementById('strFill'), lbl = document.getElementById('strLbl')
  if (fill) fill.style.width = '0'
  if (lbl)  { lbl.textContent = 'Enter a password'; lbl.style.color = '' }
}

function switchTab(tab) {
  var isLogin = tab === 'login'
  resetForm(isLogin ? 'loginForm' : 'registerForm')
  if (isLogin) { document.getElementById('rememberMe').checked = false }
  hideBanners()
  document.getElementById('loginForm').style.display    = isLogin ? 'flex' : 'none'
  document.getElementById('registerForm').style.display = isLogin ? 'none' : 'flex'
  document.getElementById('tabLogin').classList.toggle('active', isLogin)
  document.getElementById('tabRegister').classList.toggle('active', !isLogin)
  document.getElementById('cardTitle').textContent = isLogin ? 'Welcome back' : 'Create your account'
  document.getElementById('cardSub').textContent   = isLogin ? 'Sign in to your InsightFlow account' : 'Start analysing data in minutes'
}

function showErr(msg) {
  var id = document.getElementById('loginForm').style.display !== 'none' ? 'errBanner' : 'errBanner2'
  var el = document.getElementById(id); if (!el) return
  el.textContent = msg; el.className = 'error-banner show'
  el.style.animation = 'none'; el.offsetHeight; el.style.animation = ''
}
function showOk(msg) {
  var id = document.getElementById('loginForm').style.display !== 'none' ? 'okBanner' : 'okBanner2'
  var el = document.getElementById(id); if (el) { el.textContent = msg; el.className = 'success-banner show' }
}
function hideBanners() {
  ['errBanner','okBanner','errBanner2','okBanner2'].forEach(function(id) {
    var el = document.getElementById(id)
    if (el) el.className = el.className.includes('error') ? 'error-banner' : 'success-banner'
  })
}

function setFieldState(id, state, msg) {
  var inp = document.getElementById(id), msgEl = document.getElementById(id + 'Msg'); if (!inp) return
  inp.className = 'form-input' + (state === 'err' ? ' err' : state === 'ok' ? ' ok' : '')
  if (msgEl) { msgEl.textContent = msg || ''; msgEl.className = 'val-msg' + (msg ? ' show ' + state : '') }
}

function checkStrength(v) {
  var fill = document.getElementById('strFill'), lbl = document.getElementById('strLbl')
  if (!v) { fill.style.width = '0'; lbl.textContent = 'Enter a password'; lbl.style.color = ''; return }
  var s = 0
  if (v.length >= 6) s++; if (v.length >= 10) s++
  if (/[A-Z]/.test(v)) s++; if (/[0-9]/.test(v)) s++; if (/[^A-Za-z0-9]/.test(v)) s++
  var lvl = [
    {w:'20%',bg:'#ef4444',t:'Too weak'},{w:'40%',bg:'#f97316',t:'Weak'},
    {w:'60%',bg:'#f59e0b',t:'Fair'},{w:'80%',bg:'#84cc16',t:'Good'},{w:'100%',bg:'#10b981',t:'Strong'}
  ][Math.min(s-1,4)] || {w:'20%',bg:'#ef4444',t:'Too weak'}
  fill.style.width = lvl.w; fill.style.background = lvl.bg; lbl.textContent = lvl.t; lbl.style.color = lvl.bg
}

function toggleEye(id, btn) {
  var inp = document.getElementById(id)
  if (inp.type === 'password') { inp.type = 'text'; btn.style.opacity = '.8' }
  else { inp.type = 'password'; btn.style.opacity = '.35' }
}

function setLoading(btnId, on) {
  var btn = document.getElementById(btnId); if (!btn) return
  btn.disabled = on; btn.classList.toggle('loading', on)
}

function doLogin() {
  hideBanners()
  var email = document.getElementById('lEmail').value.trim().toLowerCase()
  var pass  = document.getElementById('lPass').value
  var ok = true
  if (!email) { setFieldState('lEmail','err','Email is required'); ok = false }
  else if (!/^[^@]+@[^@]+\.[^@]+$/.test(email)) { setFieldState('lEmail','err','Enter a valid email'); ok = false }
  if (!pass) { setFieldState('lPass','err','Password is required'); ok = false }
  if (!ok) return

  setLoading('loginBtn', true)
  var token = ''
  try { var arr = new Uint8Array(32); window.crypto.getRandomValues(arr); token = Array.from(arr).map(function(b){return b.toString(16).padStart(2,'0')}).join('') } catch(e) {}

  fetch(API + '/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email:email, password:pass, token:token})
  })
  .then(function(r){return r.json()})
  .then(function(data) {
    setLoading('loginBtn', false)
    if (data.status === 'success') {
      if (document.getElementById('rememberMe').checked) {
        localStorage.setItem('insightflow_remember', email)
      } else {
        localStorage.removeItem('insightflow_remember')
      }
      localStorage.setItem('userEmail', data.email)
      showOk('Login successful! Redirecting...')
      var dest = 'dashboard.html'
      try { dest = sessionStorage.getItem('insightflow_redirect') || 'dashboard.html' } catch(e) {}
      try { sessionStorage.removeItem('insightflow_redirect') } catch(e) {}
      setTimeout(function(){ window.location.href = dest }, 600)
    } else {
      setFieldState('lPass','err','')
      showErr(data.message || 'Invalid email or password')
    }
  })
  .catch(function() { setLoading('loginBtn', false); showErr('Cannot reach server. Make sure Flask is running.') })
}

function doRegister() {
  hideBanners()
  var name  = document.getElementById('rName').value.trim()
  var email = document.getElementById('rEmail').value.trim().toLowerCase()
  var pass  = document.getElementById('rPass').value
  var conf  = document.getElementById('rConf').value
  var ok = true
  if (!name || name.length < 2) { setFieldState('rName','err','Name must be at least 2 characters'); ok = false }
  if (!email || !/^[^@]+@[^@]+\.[^@]+$/.test(email)) { setFieldState('rEmail','err','Enter a valid email'); ok = false }
  if (!pass || pass.length < 6) { setFieldState('rPass','err','Password must be at least 6 characters'); ok = false }
  if (pass !== conf) { setFieldState('rConf','err','Passwords do not match'); ok = false }
  if (!ok) return

  setLoading('registerBtn', true)
  fetch(API + '/register', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name:name, email:email, password:pass})
  })
  .then(function(r){return r.json()})
  .then(function(data) {
    setLoading('registerBtn', false)
    if (data.status === 'success') {
      showOk('Account created! Signing you in...')
      setTimeout(function() {
        resetForm('registerForm')
        document.getElementById('lEmail').value = email
        document.getElementById('lPass').value  = pass
        switchTab('login')
        setTimeout(doLogin, 300)
      }, 800)
    } else { showErr(data.message || 'Registration failed') }
  })
  .catch(function() { setLoading('registerBtn', false); showErr('Cannot reach server. Make sure Flask is running.') })
}

/* ── Forgot password ── */
function showForgot() {
  var tabs = document.querySelector('.tabs'), lf = document.getElementById('loginForm')
  var hdr = document.getElementById('cardTitle'), sub = document.getElementById('cardSub')
  if (tabs) tabs.style.display = 'none'
  if (lf)   lf.style.display = 'none'
  if (hdr)  hdr.textContent = 'Forgot Password'
  if (sub)  sub.textContent = 'Enter your email to retrieve your password'

  var existing = document.getElementById('forgotPanel'); if (existing) existing.remove()

  var panel = document.createElement('div')
  panel.id = 'forgotPanel'
  panel.className = 'form-scroll'
  panel.innerHTML =
    '<div class="form-body" style="justify-content:flex-start">' +
      '<div class="form-group">' +
        '<label class="form-label">Email Address</label>' +
        '<input class="form-input" type="email" id="forgotEmail" placeholder="you@example.com" oninput="clearForgotState()">' +
        '<div class="val-msg" id="forgotMsg"></div>' +
      '</div>' +
      '<button class="submit-btn" id="forgotBtn" onclick="submitForgot()" style="margin-bottom:12px">' +
        '<span class="btn-text">Retrieve Password</span>' +
        '<div class="btn-spinner"></div>' +
      '</button>' +
      '<div id="pwReveal"></div>' +
      '<div class="toggle-row" style="margin-top:12px">Remember it? <span onclick="closeForgot()">Back to Sign In</span></div>' +
    '</div>'

  document.querySelector('.auth-card').appendChild(panel)
  setTimeout(function(){ var e = document.getElementById('forgotEmail'); if (e) e.focus() }, 50)
}

function clearForgotState() {
  var msgEl = document.getElementById('forgotMsg')
  var emailEl = document.getElementById('forgotEmail')
  var reveal = document.getElementById('pwReveal')
  if (msgEl)   { msgEl.textContent = ''; msgEl.className = 'val-msg' }
  if (emailEl) emailEl.className = 'form-input'
  if (reveal)  reveal.innerHTML = ''
}

function closeForgot() {
  var panel = document.getElementById('forgotPanel'); if (panel) panel.remove()
  var tabs = document.querySelector('.tabs'), lf = document.getElementById('loginForm')
  var hdr = document.getElementById('cardTitle'), sub = document.getElementById('cardSub')
  if (tabs) tabs.style.display = 'flex'
  if (lf)   lf.style.display = 'flex'
  if (hdr)  hdr.textContent = 'Welcome back'
  if (sub)  sub.textContent = 'Sign in to your InsightFlow account'
}

function submitForgot() {
  var emailEl = document.getElementById('forgotEmail')
  var msgEl   = document.getElementById('forgotMsg')
  var btn     = document.getElementById('forgotBtn')
  var reveal  = document.getElementById('pwReveal')
  if (!emailEl || !msgEl) return

  var val = emailEl.value.trim().toLowerCase()

  // Clear previous reveal
  if (reveal) reveal.innerHTML = ''
  msgEl.className = 'val-msg'

  // Client-side email check
  if (!val || !/^[^@]+@[^@]+\.[^@]+$/.test(val)) {
    emailEl.className = 'form-input err'
    msgEl.className = 'val-msg show err'
    msgEl.textContent = 'Enter a valid email address.'
    return
  }

  // Show loading
  emailEl.disabled = true
  if (btn) { btn.disabled = true; btn.classList.add('loading') }

  fetch(API + '/forgot-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: val })
  })
  .then(function(r) { return r.json() })
  .then(function(data) {
    if (btn) { btn.disabled = false; btn.classList.remove('loading') }
    emailEl.disabled = false

    if (data.status === 'success') {
      // ── Email verified — show set new password form directly ──
      emailEl.className = 'form-input ok'
      msgEl.className = 'val-msg show ok'
      msgEl.textContent = 'Email verified! Set your new password below.'

      if (reveal) {
        reveal.innerHTML =
          '<div class="pw-reveal-box" style="margin-top:10px">' +
            '<div style="margin-bottom:8px">' +
              '<label style="font-size:9px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,.3);text-transform:uppercase;display:block;margin-bottom:4px">New Password</label>' +
              '<input id="newPw1" type="password" placeholder="Min 6 characters" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:9px 12px;color:white;font-size:13px;outline:none;box-sizing:border-box">' +
            '</div>' +
            '<div style="margin-bottom:12px">' +
              '<label style="font-size:9px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,.3);text-transform:uppercase;display:block;margin-bottom:4px">Confirm Password</label>' +
              '<input id="newPw2" type="password" placeholder="Repeat password" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:9px 12px;color:white;font-size:13px;outline:none;box-sizing:border-box">' +
            '</div>' +
            '<div id="newPwMsg" style="font-size:11px;margin-bottom:10px"></div>' +
            '<button onclick="submitNewPassword(' + JSON.stringify(val) + ')" style="width:100%;background:linear-gradient(135deg,#ff8c00,#e07000);color:white;border:none;padding:10px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer">Set New Password</button>' +
          '</div>'
      }
    } else {
      // ── Email not found ──
      emailEl.className = 'form-input err'
      msgEl.className = 'val-msg show err'
      msgEl.textContent = data.message || 'No account found with that email.'
    }
  })
  .catch(function() {
    if (btn) { btn.disabled = false; btn.classList.remove('loading') }
    emailEl.disabled = false
    emailEl.className = 'form-input err'
    msgEl.className = 'val-msg show err'
    msgEl.textContent = 'Cannot reach server. Make sure Flask is running.'
  })
}

function submitNewPassword(email) {
  var pw1 = document.getElementById('newPw1') ? document.getElementById('newPw1').value : ''
  var pw2 = document.getElementById('newPw2') ? document.getElementById('newPw2').value : ''
  var msg = document.getElementById('newPwMsg')

  if (!pw1 || pw1.length < 6) {
    if (msg) { msg.textContent = 'Password must be at least 6 characters'; msg.style.color = '#ef4444' }
    return
  }
  if (pw1 !== pw2) {
    if (msg) { msg.textContent = 'Passwords do not match'; msg.style.color = '#ef4444' }
    return
  }

  if (msg) { msg.textContent = 'Updating...'; msg.style.color = '#ff8c00' }

  fetch(API + '/reset-password-direct', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, password: pw1 })
  })
  .then(function(r) { return r.json() })
  .then(function(data) {
    if (data.status === 'success') {
      if (msg) { msg.textContent = '✓ Password updated! Redirecting to login...'; msg.style.color = '#10b981' }
      setTimeout(function() {
        closeForgot()
        switchTab('login')
      }, 1800)
    } else {
      if (msg) { msg.textContent = data.message || 'Update failed.'; msg.style.color = '#ef4444' }
    }
  })
  .catch(function() {
    if (msg) { msg.textContent = 'Connection error.'; msg.style.color = '#ef4444' }
  })
}

function copyPassword() {
  var el = document.getElementById('revealedPw')
  if (!el) return
  var btn = document.querySelector('.pw-copy-btn')
  navigator.clipboard.writeText(el.textContent).then(function() {
    if (btn) { btn.textContent = 'Copied!'; setTimeout(function(){ btn.textContent = 'Copy' }, 1800) }
  }).catch(function() {
    // Fallback for older browsers
    var ta = document.createElement('textarea')
    ta.value = el.textContent
    document.body.appendChild(ta)
    ta.select()
    document.execCommand('copy')
    document.body.removeChild(ta)
    if (btn) { btn.textContent = 'Copied!'; setTimeout(function(){ btn.textContent = 'Copy' }, 1800) }
  })
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
}
